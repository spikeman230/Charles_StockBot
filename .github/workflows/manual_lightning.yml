name: NOC 手動閃電突擊雷達

# 關鍵：同時支援「手動按鈕」與「外部 API (cron-job.org) 觸發」
on: 
  workflow_dispatch: 
  schedule:          # 👈 新增這組內建的自動發射器
     # 這是 UTC 時間 (台灣時間減 8 小時)
     # 2,3,4 代表 UTC 的凌晨 2點, 3點, 4點 (等於台灣盤中的 10:00, 11:00, 12:00)
     # 1-5 代表週一到週五
     - cron: '5 2,3,4 * * 1-5'
# 🛡️ 允許機器人將 lightning_targets.json 存回倉庫
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
      
    - name: Run Lightning Scanner
      env:
        FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      run: python noc_lightning.py
      
    # 🚀 關鍵步驟：把 lightning_targets.json 存回 GitHub 倉庫！
    - name: Commit & Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add lightning_targets.json
        # 檢查如果有變動才 commit，避免報錯閃退
        git diff-index --quiet HEAD || git commit -m "⚡ 自動同步閃電突擊名單"
        git push
