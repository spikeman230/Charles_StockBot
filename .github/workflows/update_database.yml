name: NOC 每日盤後資料庫補給

on:
  schedule:
    # ⏰ 這是 UTC 時間。08:30 等於台灣時間下午 16:30 (每週一到週五執行)
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # 保留手動按鈕以防萬一

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install FinMind pandas yfinance python-dotenv tqdm
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run Database Update
      env:
        FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      run: python update_db.py
      
    - name: Commit & Push updated database
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -f noc_warroom.db
        git diff-index --quiet HEAD || git commit -m "📦 自動更新每日戰情資料庫"
        git push
