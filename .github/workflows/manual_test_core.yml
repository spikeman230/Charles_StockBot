name: 🧪 戰情室底層引擎手動測試 (Test Core)

# 觸發條件：手動點擊按鈕執行
on: 
  workflow_dispatch:

jobs:
  test_noc_core:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 下載戰備程式碼
      uses: actions/checkout@v3

    - name: 🐍 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 根據您的開發環境調整

    - name: 📦 安裝軍火套件
      run: |
        python -m pip install --upgrade pip
        # 確保安裝 test_core.py 所需的套件，若您有 requirements.txt 可改為 pip install -r requirements.txt
        pip install pandas FinMind python-dotenv yfinance tqdm

    - name: 🚀 點火執行 test_core.py
      env:
        # 將 GitHub Secrets 中的金鑰映射到虛擬環境變數中
        FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      run: |
        python test_core.py
