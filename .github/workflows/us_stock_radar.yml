name: NOC 美股雷達自動掃描

on:
  workflow_dispatch:                     # 手動觸發
  schedule:
    - cron: '21 21 * * 1-5'               # 每天 UTC 21:00 = 台灣時間早上 5:00

permissions:
  contents: write                       # 若需要 commit 結果回倉庫，請啟用此權限

jobs:
  scan-us-stocks:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy python-dotenv requests
          # 若有 requirements.txt 則一併安裝（可選）
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 執行美股雷達掃描
        env:
          # 若有使用 FinMind Token（美股可能不需要，但保留）
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python noc_radar_us.py

      - name: 上傳掃描結果 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: radar_us_targets
          path: radar_us_targets.json
          retention-days: 7

      # (可選) 將結果自動 commit 回倉庫，供 stock_bot_us 直接讀取
      - name: Commit 結果回倉庫（若有變更）
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f radar_us_targets.json
          git diff --cached --quiet || git commit -m "?? 自動更新美股雷達火種清單"
          git push
