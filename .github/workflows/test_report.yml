name: NOC-Weekend-Test

on:
  schedule:
    # 測試用：每小時的 15 分自動觸發一次 (不分平假日)
    - cron: '15 * * * *'
  workflow_dispatch: # 保留手動點火，方便你現在測試

jobs:
  test-and-persist:
    runs-on: ubuntu-latest
    # 重要：開啟寫入權限，否則無法自動備份 CSV
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy mplfinance requests

      - name: Run Test Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 如果暫時不想發信，下面三行可以先不設，但程式裡要註解掉 Email 功能
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python stock_bot.py

      - name: 💾 執行持久化備份
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "NOC-Bot"
          
          # 如果 CSV 不存在則建立標頭
          if [ ! -f noc_trading_log.csv ]; then
            echo "時間,代號,收盤,RSI,狀態" > noc_trading_log.csv
          fi
          
          git add noc_trading_log.csv
          
          # 檢查是否有變動，有變動才 commit
          if ! git diff --cached --exit-code; then
            git commit -m "📡 自動備份測試: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "資料無變動，跳過備份。"
          fi
