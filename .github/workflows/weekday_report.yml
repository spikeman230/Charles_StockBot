name: NOC-Weekend-Test

on:
  schedule:
    # 測試用：每小時的 15 分自動觸發一次 (不分平假日)
    - cron: '05 1,4,7 * * 1-5'
  workflow_dispatch: # 保留手動點火，方便你現在測試

jobs:
  run-stock-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy mplfinance requests

      - name: Run stock script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # 👇 確保機器人拿得到 FinMind 鑰匙來查營收與籌碼
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python stock_bot.py

      - name: 💾 自動備份戰情日誌與狀態記憶
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "NOC-Bot"
          
          # 確保檔案存在，不存在就建立標頭 (已對齊 v7.6 的 10 個欄位)
          if [ ! -f noc_trading_log.csv ]; then
            echo "日期,代號,名稱,收盤價,RSI,量能狀態,趨勢狀態,戰場預判,籌碼訊號,行動指令" > noc_trading_log.csv
          fi
          
          # 👇 將 CSV 日誌與 JSON 狀態大腦一起加入備份追蹤
          git add noc_trading_log.csv noc_state.json || true
          
          # 只有在真的有變動時才 commit
          if ! git diff --cached --exit-code; then
            git commit -m "📡 NOC 戰報與記憶體更新: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "今日此時段無新數據變動。"
          fi
