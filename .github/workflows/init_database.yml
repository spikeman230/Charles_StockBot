name: NOC 戰情室初始建庫大補丸

on: 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  initialize-db:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: | 
        pip install FinMind pandas yfinance python-dotenv tqdm
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # ========== 新增：安裝 Git LFS（若需要）並取消對該檔案的追蹤 ==========
    - name: Install Git LFS
      run: |
        sudo apt-get update
        sudo apt-get install git-lfs
        git lfs install

    - name: Run Database Initialization
      env:
        FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      run: python init_db.py
      
    - name: 檢查資料庫內容
      run: |
        echo "📊 檢查 stock_prices 總筆數："
        sqlite3 noc_warroom.db "SELECT COUNT(*) FROM stock_prices;"
        echo "📊 檢查不重複股票家數："
        sqlite3 noc_warroom.db "SELECT COUNT(DISTINCT symbol) FROM stock_prices;"

    # 🚀 關鍵步驟：移除 LFS 追蹤，確保提交真實資料庫
    - name: Commit & Push database
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 移除 LFS 對 noc_warroom.db 的追蹤（若存在的話）
        git lfs untrack "noc_warroom.db" || true
        # 更新 .gitattributes（若有變更）
        git add .gitattributes
        
        # 強制加入真實資料庫檔案
        git add -f noc_warroom.db
        
        # 檢查是否有變更，若有則 commit 並 push
        git diff-index --quiet HEAD || git commit -m "🗄️ 初始建置 NOC 歷史戰情資料庫 (SQLite)"
        git push
