name: NOC Portfolio 損益與庫存管理

on:
  workflow_dispatch:
  schedule:
    - cron: '30 13 * * 1-5'

# 🌟 依照總部的標準寫法：將寫入權限設定在全域層級
permissions:
  contents: write

# 🛡️ 裝甲級防護：強制禁止 Python 生成 __pycache__，確保 Git 環境純淨
env:
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  run-portfolio:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install yfinance pandas numpy requests python-dotenv

      - name: Validate Trello secrets
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}      
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "TRELLO_KEY length: ${#TRELLO_KEY}"
          echo "TRELLO_TOKEN length: ${#TRELLO_TOKEN}"
          echo "TRELLO_BOARD_ID length: ${#TRELLO_BOARD_ID}"
          if [ -z "$TRELLO_KEY" ] || [ -z "$TRELLO_TOKEN" ] || [ -z "$TRELLO_BOARD_ID" ]; then
            echo "❌ Trello 環境變數未完整設定，請檢查 GitHub Secrets。"
            exit 1
          fi
          echo "✅ Trello 環境變數已設定"

      - name: Run Portfolio 損益與庫存管理
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
          TRELLO_LIST_NAME: ${{ secrets.TRELLO_LIST_NAME || '庫存機櫃' }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python noc_protfolio.py

      # 🌟 完全致敬總部的短路判斷寫法，並使用 -f 強制加入資料庫
      - name: Commit & Push updated database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f noc_portfolio.db
          git diff-index --quiet HEAD || git commit -m "🗄️ 自動更新軍需官總帳資料庫"
          git push
