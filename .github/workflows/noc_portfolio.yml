name: NOC Portfolio 損益與庫存管理

on:
  # 允許手動觸發
  workflow_dispatch:
  # 定時排程：每個交易日台灣時間 14:30 (UTC 6:30)
  schedule:
    - cron: '30 9 * * 1-5'

jobs:
  run-portfolio:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 安裝相依套件（與 daily_report.yml 相同作法）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install yfinance pandas numpy requests python-dotenv

     # 驗證 Trello 環境變數是否存在（增加診斷）
      - name: Validate Trello secrets
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}       # 👈 補上這行
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }} # 👈 補上這行
          TG_TOKEN: ${{ secrets.TG_TOKEN }}      
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "TRELLO_KEY length: ${#TRELLO_KEY}"
          echo "TRELLO_TOKEN length: ${#TRELLO_TOKEN}"
          echo "TRELLO_BOARD_ID length: ${#TRELLO_BOARD_ID}"
          if [ -z "$TRELLO_KEY" ] || [ -z "$TRELLO_TOKEN" ] || [ -z "$TRELLO_BOARD_ID" ]; then
            echo "❌ Trello 環境變數未完整設定，請檢查 GitHub Secrets。"
            exit 1
          fi
          echo "✅ Trello 環境變數已設定"

      - name: Run Portfolio 損益與庫存管理
        env:
          # 使用與 daily_report.yml 相同的變數名稱 TRELLO_KEY
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
          TRELLO_LIST_NAME: ${{ secrets.TRELLO_LIST_NAME || '庫存機櫃' }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}         # 👈 改成這樣
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}     # 👈 改成這樣
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python noc_protfolio.py

      # 上傳資料庫備份（與 daily_report.yml 的備份風格類似）
      - name: Upload portfolio database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noc-portfolio-db
          path: noc_portfolio.db
          retention-days: 7

