name: NOC 手動游擊雷達

# 關鍵：workflow_dispatch 代表這個腳本沒有定時器，只能「手動按鈕」觸發！
on: 
  workflow_dispatch: 

# 🛡️ 關鍵權限解鎖：允許機器人自己 Commit 檔案寫入倉庫
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
      
    - name: Run Scanner
      env:
        FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      run: python noc_radar.py
      
    # 🚀 關鍵步驟：把 radar_targets.json 存回 GitHub 倉庫！
    - name: Commit & Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
          
        # 🛡️ 防呆 1：如果這次雷達掃描名單沒有變動，就不強制 commit，避免報錯
        git diff --staged --quiet || git commit -m "🤖 自動同步雷達火種名單"
        
        # 🛡️ 防呆 2 (核心修復)：推上雲端前，強制先拉取總司令最新修改的程式碼並疊加
        git pull --rebase origin main
         
        # 🚀 點火發射
        git push origin main
