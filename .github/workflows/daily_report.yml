name: Daily Stock Reporter

on:
  schedule:
    # 台灣時間 09:30, 12:30, 13:30 執行 (週一至週五)
    - cron: '30 1,4,5 * * 1-5'
  workflow_dispatch:

jobs:
  run-stock-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 修正名稱為 setup-python
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy mplfinance requests

      - name: Run stock script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python stock_bot.py

      - name: 💾 自動備份戰情日誌
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "NOC-Bot"
          
          # 確保檔案存在，不存在就建立標頭
          if [ ! -f noc_trading_log.csv ]; then
            echo "日期,代號,名稱,收盤價,RSI,量能狀態,趨勢狀態,戰場預判,行動指令" > noc_trading_log.csv
          fi
          
          git add noc_trading_log.csv
          
          # 只有在真的有變動時才 commit
          if ! git diff --cached --exit-code; then
            git commit -m "📡 NOC 戰報更新: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "今日此時段無新數據變動。"
          fi
